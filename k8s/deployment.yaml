apiVersion: apps/v1
kind: Deployment
metadata:
  name: delivery-optimization
  namespace: production
  labels:
    app: delivery-optimization
spec:
  replicas: 2
  selector:
    matchLabels:
      app: delivery-optimization
  template:
    metadata:
      labels:
        app: delivery-optimization
    spec:
      containers:
        - name: delivery-optimization
          image: your-dockerhub-username/delivery-optimization:IMAGE_TAG
          ports:
            - containerPort: 3000
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: delivery-optimization-svc
  namespace: production
spec:
  selector:
    app: delivery-optimization
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
  type: ClusterIP
