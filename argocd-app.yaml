apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: delivery-optimization
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/prathickshaselvaraj/delivery-optimization-gitops
    targetRevision: main
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: production
  syncPolicy:
    automated:
      prune: true       # removes old resources
      selfHeal: true    # reverts manual changes
    syncOptions:
      - CreateNamespace=true
